name: Frontend CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
          -t ghcr.io/${{ github.repository_owner }}/cashier_frontend:latest \
          .

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
          -u ${{ github.actor }} \
          --password-stdin

      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push \
          ghcr.io/${{ github.repository_owner }}/cashier_frontend:latest